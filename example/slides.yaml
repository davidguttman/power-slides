slides:
  - type: overlay
    eyebrow: Start here
    title: power-slides starter
    subtitle: slides.yaml + optional talk.js
    notes:
      - The starter is intentionally plain. It should show the authoring contract, not a finished custom talk.

  - type: overlay
    eyebrow: Reusable app shell
    title: CLI owns the shell
    subtitle: dev/build, generated HTML, Options, and remote control are shared framework behavior.
    notes:
      - New talks should not copy app-shell code. The CLI wires the runtime, PeerJS, options overlay, and build output.

  - type: image
    src: /sample.svg
    fit: contain
    notes:
      - This is a simple built-in media slide served from public/.

  - type: iframe
    src: https://david.app/
    title: david.app external iframe
    device: iphone
    layout: phone-right
    side:
      eyebrow: Framework primitive
      title: Phone-framed iframe
      subtitle: YAML controls the reusable device frame and side-copy layout.
      bullets:
        - Cross-origin page stays untouched
        - Parent arrows remain available
        - No custom renderer required
    notes:
      - 'This demonstrates the iPhone iframe primitive: device: iphone plus layout: phone-right.'

  - type: summary
    eyebrow: Next steps
    title: Customize only when needed
    card:
      title: Where to look
      bullets:
        - Use the commented talk.js stub for optional hooks.
        - See examples/showcase for custom renderers and animated slides.
        - Keep normal talks content-first in slides.yaml.
    notes:
      - Point users to the stub for extension points and to the showcase for richer examples.
