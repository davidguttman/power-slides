title: Power Slides Starter
style:
  fontFamily: Inter, system-ui, sans-serif
  background: '#061018'
  color: white
  "--accent": '#5ffbf1'
slides:
  - title: Your first deck
    subtitle: Plain content in slides.yaml. Press o for remote control.
    background: /sample.svg
    brightness: 0.45
    align: center
  - image: /sample.svg
    fit: contain
  - video: /fractal-loop.mp4
    controls: true
    muted: true
    loop: true
    fit: contain
  - background: /sample.svg
    brightness: 0.55
    columns:
      - image: /sample.svg
        fit: contain
      - title: Composition is the model
        bullets:
          - Columns hold slide-shaped things
          - Images, copy, and embeds stay separate
  - iframe: https://example.com/demo
    device: iphone
    background: '#061018'
    title: The web can be inside the deck
  - html: |
      <div style="width:100vw;height:100vh;display:grid;place-items:center;color:white;font-family:Inter,system-ui,sans-serif;text-align:center">
        <div>
          <p style="letter-spacing:.18em;text-transform:uppercase;color:#5ffbf1">Escape hatch</p>
          <h1>Trusted HTML gets you unstuck.</h1>
        </div>
      </div>
  - custom: particleField
    title: "Escape hatch: JavaScript"
    subtitle: talk.js is real browser code when the moment is worth it.
