slides:
  - title: Main point
    subtitle: Optional subtitle
    background: https://images.unsplash.com/photo-1497366811353-6870744d04b2?auto=format&fit=crop&w=1800&q=80
    brightness: 0.45
    align: center
    notes:
      - Showcase default text shape with title, subtitle, background, brightness, and align.

  - image: /fist-bump.gif
    fit: contain
    notes:
      - Showcase image shape with an existing public asset.

  - video: /spin.mp4
    controls: true
    muted: true
    loop: true
    fit: contain
    notes:
      - Showcase video shape with an existing public asset.

  - background: https://images.unsplash.com/photo-1515879218367-8466d910aaa4?auto=format&fit=crop&w=1800&q=80
    brightness: 0.55
    columns:
      - iframe: https://example.com/demo
        iframeTitle: Example app
        device: iphone
      - title: Demo in context
        bullets:
          - Cross-origin page stays untouched
          - Parent arrows remain available
    notes:
      - Showcase columns shape; iframe plus copy belongs in columns.

  - iframe: https://example.com/demo
    iframeTitle: Example app
    device: iphone
    background: '#061018'
    notes:
      - Showcase iframe shape as a full-slide embed.

  - html: |
      <div style="width:100vw;height:100vh;color:white">
        <h1>Custom HTML</h1>
      </div>
    notes:
      - Showcase html shape with trusted inline markup.

  - custom: particleField
    title: Generative canvas
    notes:
      - Showcase custom shape delegated to talk.js.
